<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Database Data</title>
    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}

    <script>
        function redirect(url) {
            var base_url = window.location.origin;
            window.open(base_url + '/' + url, '_self');
        }
    </script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="#">Приложение для распознавания и суммаризации текста</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item active">
                    <a href="{% url 'main' %}" class="nav-link">Главная</a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'upload' %}" class="nav-link">Загрузка аудиофайла</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container">
        {% block content%}
        {% endblock content %}
    </div>
</body>

</html>
